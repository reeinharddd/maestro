schema: spec-driven

context: |
  Tech stack: Go 1.25.0 CLI tool, Cobra, modernc.org/sqlite, golang-migrate
  Architecture: cmd/okit/ (main), internal/ (business logic), pkg/models/ (shared types)
  Testing: go test ./..., go vet ./..., go test -race -coverprofile=coverage.out ./...
